<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Selector de equipo</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="equipment-browser">

  <header class="equipment-header">
    <h1 id="slotTitle">Selector de equipo</h1>
    <button id="backBtn">Regresar</button>
  </header>

  <div class="equipment-table-wrapper">
    <table class="equipment-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Manos</th>
          <th>Stat</th>
          <th>Peso</th>
          <th>Daño</th>
          <th>Maestría</th>
          <th>Precio</th>
          <th>Acción</th>
        </tr>
      </thead>

      <tbody id="equipmentTableBody">
      </tbody>

    </table>
  </div>

</div>

<script src="selector-equipo.js"></script>

</body>
</html>
